<header>

  <button class="batch current" id="currentBatchBtn">打包当前元素库 PNG ↓</button>
  <button class="batch all" id="batchBtn">打包全部 160 款 PNG ↓</button>
</header>
<div class="app">

    <small class="eyebrow">VIDEO UI ASSET LIBRARY</small>
    <h1>可编辑的<br><i>视觉元素库。</i></h1>

    <div class="colors" id="colors"></div>
    <div class="style-exports" id="styleExports"><small class="eyebrow">按风格整套导出 PNG</small></div>
    <div class="filters" id="filters"></div>
    <div class="style-note">最终导出：透明 PNG<br>高清尺寸：2400 × 1400<br>可直接导入剪辑与合成软件。</div>
  </aside>
  <section class="library">
    <small class="eyebrow" id="collectionLabel"></small>
    <h2 id="heading"></h2>
    <div class="grid" id="grid"></div>
  </section>
  <aside class="right">
    <small class="eyebrow">元素属性</small>
    <h3 id="assetName"></h3>
    <div class="preview" id="preview"></div>
    <div class="field"><label>主文字（可编辑）</label><input id="mainText"></div>
    <div class="field" hidden style="display:none"><label>辅助文字（已停用）</label><textarea id="subText"></textarea></div>
    <button class="export" id="exportBtn">导出透明 PNG <b>↗</b></button>
    <p class="tip">PNG 保持透明背景，尺寸为 2400 × 1400；适合视频剪辑、AE/PR、Figma、Illustrator 和空间交互。</p>
  </aside>
</div>

        next=/\stransform="/.test(next)?next.replace(/transform="([^"]*)"/,`transform="translate(0 22) $1"`):next.replace('<text','<text transform="translate(0 22)"');
        return next.replace(/\stext-rendering="[^"]*"/g,'').replace('>',' text-rendering="geometricPrecision">');
      });
      if(tune?.[2])tuned=tuned.replace(/<tspan x="[^"]*"/g,`<tspan x="${tune[2]}"`);
      return tuned;
    }
    if(visible&&!/[A-Za-z0-9\u3400-\u9fff]/.test(visible))return node;
    return '';
  });
  let result=`<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="${esc(items()[i][1])}">${body}</svg>`;styleKey=old;return result;
}
function setStyle(next){styleKey=next;selected=0;filter='全部';document.body.style.setProperty('--accent',lib().accent);renderChrome();render()}
function renderChrome(){let l=lib();$('#headerMeta').textContent=`${l.name} · ${l.items.length} ITEMS / 全库 ${totalItems()} ITEMS`;$('#styleDescription').textContent=l.description;$('#collectionLabel').textContent=l.label;$('#colors').innerHTML='';l.palette.forEach(c=>{let b=document.createElement('button');b.style.background=c;b.title='切换主题色 '+c;b.onclick=()=>{l.accent=c;document.body.style.setProperty('--accent',c);render()};$('#colors').appendChild(b)});let cats=['全部',...new Set(l.items.map(x=>x[0]))];$('#filters').innerHTML='';cats.forEach(c=>{let b=document.createElement('button');b.textContent=c+(c==='全部'?` (${l.items.length})`:` (${l.items.filter(x=>x[0]===c).length})`);b.className=c===filter?'on':'';b.onclick=()=>{filter=c;renderChrome();render()};$('#filters').appendChild(b)});$('#heading').innerHTML=`${filter==='全部'?l.name:filter+'视觉组件'} <span class="count-badge">${filter==='全部'?l.items.length:l.items.filter(x=>x[0]===filter).length}</span>`;$('#currentBatchBtn').textContent=`打包当前：${l.name} ↓`}
function sync(){let d=data(selected);$('#assetName').textContent=items()[selected][1];$('#preview').innerHTML=svgFor(selected);$('#mainText').value=d.main;$('#subText').value=d.sub}
function render(){let g=$('#grid');g.innerHTML='';items().forEach((x,i)=>{if(filter!=='全部'&&x[0]!==filter)return;let a=document.createElement('article');a.className='card '+(i===selected?'on':'');a.innerHTML=`<div class="stage">${svgFor(i)}</div><footer><span><b>${esc(x[1])}</b><small>${esc(x[0])} · PNG 透明导出</small></span><button class="card-export">PNG ↓</button></footer>`;a.onclick=()=>{selected=i;render()};a.querySelector('.card-export').onclick=e=>{e.stopPropagation();downloadOne(i,e.currentTarget)};g.appendChild(a)});sync()}
$('#mainText').oninput=e=>{copies[key(selected)]={main:e.target.value,sub:$('#subText').value};render()};$('#subText').oninput=e=>{copies[key(selected)]={main:$('#mainText').value,sub:e.target.value};render()};
function safeName(s){return s.replace(/[\\/:*?"<>|]/g,'-')}function saveBlob(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1500)}
const PNG_SCALE=2;
function pngBlobFor(i,chosenStyle=styleKey){return new Promise((resolve,reject)=>{let source=new Blob([svgFor(i,chosenStyle)],{type:'image/svg+xml;charset=utf-8'}),url=URL.createObjectURL(source),img=new Image();img.onload=()=>{try{let canvas=document.createElement('canvas');canvas.width=1200*PNG_SCALE;canvas.height=700*PNG_SCALE;let ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('PNG 生成失败')),'image/png')}catch(error){URL.revokeObjectURL(url);reject(error)}};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('组件渲染失败'))};img.src=url})}
async function pngBytesFor(i,chosenStyle=styleKey){return new Uint8Array(await(await pngBlobFor(i,chosenStyle)).arrayBuffer())}
async function runBusy(button,label,work){let old=button.textContent;button.disabled=true;try{return await work(value=>button.textContent=value)}finally{button.disabled=false;button.textContent=old}}
async function downloadOne(i,button=$('#exportBtn')){let sk=styleKey,l=lib(),item=items()[i];await runBusy(button,'正在生成 PNG…',async()=>saveBlob(await pngBlobFor(i,sk),safeName(l.name+'-'+item[1])+'.png'))}$('#exportBtn').onclick=()=>downloadOne(selected,$('#exportBtn'));
function u16(n){return[n&255,n>>>8&255]}function u32(n){return[n&255,n>>>8&255,n>>>16&255,n>>>24&255]}function joinBytes(...parts){let size=parts.reduce((sum,part)=>sum+part.length,0),out=new Uint8Array(size),offset=0;parts.forEach(part=>{out.set(part,offset);offset+=part.length});return out}function crc32(bytes){let c=-1;for(let b of bytes){c^=b;for(let j=0;j<8;j++)c=(c>>>1)^((c&1)?0xedb88320:0)}return(c^-1)>>>0}function makeZip(files){const enc=new TextEncoder(),locals=[],centrals=[];let offset=0;files.forEach(f=>{let name=enc.encode(f.name),content=f.data instanceof Uint8Array?f.data:enc.encode(f.text||''),crc=crc32(content),localHeader=new Uint8Array([...u32(0x04034b50),...u16(20),...u16(0x800),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(content.length),...u32(content.length),...u16(name.length),...u16(0)]),local=joinBytes(localHeader,name,content);locals.push(local);let centralHeader=new Uint8Array([...u32(0x02014b50),...u16(20),...u16(20),...u16(0x800),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(content.length),...u32(content.length),...u16(name.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset)]),central=joinBytes(centralHeader,name);centrals.push(central);offset+=local.length});let centralSize=centrals.reduce((n,x)=>n+x.length,0),end=new Uint8Array([...u32(0x06054b50),...u16(0),...u16(0),...u16(files.length),...u16(files.length),...u32(centralSize),...u32(offset),...u16(0)]);return new Blob([...locals,...centrals,end],{type:'application/zip'})}
async function exportStyle(sk,button){let l=libraries[sk];await runBusy(button,'准备生成…',async update=>{let files=[];for(let i=0;i<l.items.length;i++){update(`生成 ${i+1}/${l.items.length}…`);files.push({name:`${String(i+1).padStart(2,'0')}-${safeName(l.items[i][1])}.png`,data:await pngBytesFor(i,sk)})}saveBlob(makeZip(files),safeName(`ElementLab-${l.name}-${l.items.length}款PNG.zip`))})}
async function exportAll(button){await runBusy(button,'准备生成全部 PNG…',async update=>{let files=[],done=0,total=totalItems();for(let[sk,l]of Object.entries(libraries)){for(let i=0;i<l.items.length;i++){done++;update(`生成 ${done}/${total}…`);files.push({name:`${l.name}/${String(i+1).padStart(2,'0')}-${safeName(l.items[i][1])}.png`,data:await pngBytesFor(i,sk)})}}saveBlob(makeZip(files),`ElementLab-全部视觉组件-${total}款PNG.zip`)})}
function renderStyleExports(){let box=$('#styleExports');box.querySelectorAll('button').forEach(button=>button.remove());Object.entries(libraries).forEach(([sk,l])=>{let button=document.createElement('button');button.textContent=`${l.name} · ${l.items.length}款 PNG ↓`;button.onclick=()=>exportStyle(sk,button);box.appendChild(button)})}
$('#currentBatchBtn').onclick=()=>exportStyle(styleKey,$('#currentBatchBtn'));
$('#batchBtn').onclick=()=>exportAll($('#batchBtn'));
Object.entries(libraries).forEach(([k,l])=>{let o=document.createElement('option');o.value=k;o.textContent=l.name+`（${l.items.length}款）`;$('#styleSelect').appendChild(o)});$('#styleSelect').onchange=e=>setStyle(e.target.value);renderStyleExports();renderChrome();render();
window.ElementLab={libraries,svgFor,pngBlobFor,pngBytesFor,makeZip,exportStyle,exportAll};
</script>
