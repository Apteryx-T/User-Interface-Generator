    else if(k==='markerTitle')body=`<g transform="rotate(-2 600 350)">${hand(600,325,m,100,ink,900)}${line('M310 370C465 390 735 375 900 350',13,a)}${hand(600,455,s,42,a,800)}</g>${line('M290 220L250 170M900 210L950 150M940 310H1010',8)}`;
    else if(k==='whiteTitle')body=`<rect x="190" y="150" width="820" height="400" rx="36" fill="#667487" opacity=".9"/><text x="600" y="345" text-anchor="middle" font-family="${handFont}" font-size="102" font-weight="900" fill="white" stroke="white" stroke-width="10" paint-order="stroke">${esc(m)}</text>${hand(600,435,s,42,white,800)}${line('M260 505C430 470 775 550 950 495',8,white)}`;
    else if(k==='arcTitle')body=`<defs><path id="sketchArc" d="M250 440C360 120 840 120 950 440"/></defs><path d="M250 440C360 120 840 120 950 440" fill="none" stroke="${a}" stroke-width="6" stroke-dasharray="10 12"/><text font-family="${handFont}" font-size="80" font-weight="900" fill="${ink}"><textPath href="#sketchArc" startOffset="50%" text-anchor="middle">${esc(m)}</textPath></text>${hand(600,485,s,44,a,800)}${line('M455 540C545 575 655 575 745 535',9)}`;
    else if(k==='markerHighlight')body=`<g transform="rotate(-2 600 350)"><path d="M230 250C400 215 805 230 970 260L940 465C745 435 400 450 250 485Z" fill="#d8ff78" opacity=".92"/>${hand(600,350,m,86,ink,900)}${hand(600,430,s,40,ink,700)}${line('M270 490C450 515 780 495 930 475',8,ink)}</g>`;
    else if(k==='brushQuote')body=`${hand(600,220,'“',125,a,900)}${multiline(600,300,m.replace(/ /g,'|'),78,ink,900,1.02)}${hand(600,515,s,40,a,800)}${line('M340 565C470 520 720 610 865 555',9)}`;
    else if(k==='sketchArrow')body=`${line('M270 470C390 550 500 455 585 360S760 220 900 290',16)}${line('M825 215L910 290L825 340',16)}${hand(510,240,m,72)}${hand(510,320,s,38,a,700)}`;
    else if(k==='sketchCircle')body=`${line('M310 355C300 170 505 105 720 145C920 180 980 385 835 520C695 650 370 595 300 415C245 275 395 155 600 145C825 135 950 270 900 430',12)}${hand(600,335,m,80)}${hand(600,425,s,40,a,700)}`;
    else if(k==='sketchUnderline')body=`${hand(600,300,m,84,ink,900)}${hand(600,390,s,42,a,700)}${line('M275 445C460 415 750 470 930 435',15)}${line('M310 480C500 455 735 505 900 470',8)}`;
    else if(k==='sketchSparkles')body=`${line('M310 190L330 245L385 265L330 285L310 340L290 285L235 265L290 245Z',9)}${line('M890 360L910 415L965 435L910 455L890 510L870 455L815 435L870 415Z',9)}${line('M820 125L835 165L875 180L835 195L820 235L805 195L765 180L805 165Z',7)}${hand(600,325,m,82)}${hand(600,420,s,40,a,700)}`;
    else if(k==='sketchBracket')body=`${line('M330 180C260 180 260 255 300 280C260 310 260 400 330 400C260 430 270 520 340 525',14)}${line('M870 180C940 180 940 255 900 280C940 310 940 400 870 400C940 430 930 520 860 525',14)}${hand(600,315,m,78)}${hand(600,420,s,40,a,700)}`;

  let result=`<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="${esc(items()[i][1])}">${body}</svg>`;styleKey=old;return result;
}
function setStyle(next){styleKey=next;selected=0;filter='全部';document.body.style.setProperty('--accent',lib().accent);renderChrome();render()}
function renderChrome(){let l=lib();$('#headerMeta').textContent=`${l.name} · ${l.items.length} ITEMS / 全库 ${totalItems()} ITEMS`;$('#styleDescription').textContent=l.description;$('#collectionLabel').textContent=l.label;$('#colors').innerHTML='';l.palette.forEach(c=>{let b=document.createElement('button');b.style.background=c;b.title='切换主题色 '+c;b.onclick=()=>{l.accent=c;document.body.style.setProperty('--accent',c);render()};$('#colors').appendChild(b)});let cats=['全部',...new Set(l.items.map(x=>x[0]))];$('#filters').innerHTML='';cats.forEach(c=>{let b=document.createElement('button');b.textContent=c+(c==='全部'?` (${l.items.length})`:` (${l.items.filter(x=>x[0]===c).length})`);b.className=c===filter?'on':'';b.onclick=()=>{filter=c;renderChrome();render()};$('#filters').appendChild(b)});$('#heading').innerHTML=`${filter==='全部'?l.name:filter+'视觉组件'} <span class="count-badge">${filter==='全部'?l.items.length:l.items.filter(x=>x[0]===filter).length}</span>`}
function sync(){let d=data(selected);$('#assetName').textContent=items()[selected][1];$('#preview').innerHTML=svgFor(selected);$('#mainText').value=d.main;$('#subText').value=d.sub}
function render(){let g=$('#grid');g.innerHTML='';items().forEach((x,i)=>{if(filter!=='全部'&&x[0]!==filter)return;let a=document.createElement('article');a.className='card '+(i===selected?'on':'');a.innerHTML=`<div class="stage">${svgFor(i)}</div><footer><span><b>${esc(x[1])}</b><small>${esc(x[0])} · 文字可编辑</small></span><button class="card-export">导出 ↓</button></footer>`;a.onclick=()=>{selected=i;render()};a.querySelector('.card-export').onclick=e=>{e.stopPropagation();downloadOne(i)};g.appendChild(a)});sync()}
$('#mainText').oninput=e=>{copies[key(selected)]={main:e.target.value,sub:$('#subText').value};render()};$('#subText').oninput=e=>{copies[key(selected)]={main:$('#mainText').value,sub:e.target.value};render()};
function safeName(s){return s.replace(/[\\/:*?"<>|]/g,'-')}function saveBlob(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1200)}function downloadOne(i){saveBlob(new Blob([svgFor(i)],{type:'image/svg+xml;charset=utf-8'}),safeName(lib().name+'-'+items()[i][1])+'.svg')}$('#exportBtn').onclick=()=>downloadOne(selected);
function u16(n){return[n&255,n>>>8&255]}function u32(n){return[n&255,n>>>8&255,n>>>16&255,n>>>24&255]}function crc32(bytes){let c=-1;for(let b of bytes){c^=b;for(let j=0;j<8;j++)c=(c>>>1)^((c&1)?0xedb88320:0)}return(c^-1)>>>0}function makeZip(files){const enc=new TextEncoder(),locals=[],centrals=[];let offset=0;files.forEach(f=>{let name=enc.encode(f.name),content=enc.encode(f.text),crc=crc32(content),local=new Uint8Array([...u32(0x04034b50),...u16(20),...u16(0x800),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(content.length),...u32(content.length),...u16(name.length),...u16(0),...name,...content]);locals.push(local);let central=new Uint8Array([...u32(0x02014b50),...u16(20),...u16(20),...u16(0x800),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(content.length),...u32(content.length),...u16(name.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset),...name]);centrals.push(central);offset+=local.length});let centralSize=centrals.reduce((n,x)=>n+x.length,0),end=new Uint8Array([...u32(0x06054b50),...u16(0),...u16(0),...u16(files.length),...u16(files.length),...u32(centralSize),...u32(offset),...u16(0)]);return new Blob([...locals,...centrals,end],{type:'application/zip'})}
$('#batchBtn').onclick=()=>{let files=[];Object.entries(libraries).forEach(([sk,l])=>l.items.forEach((x,i)=>files.push({name:`${l.name}/${String(i+1).padStart(2,'0')}-${safeName(x[1])}.svg`,text:svgFor(i,sk)})));saveBlob(makeZip(files),`ElementLab-全部视觉组件-${totalItems()}款.zip`)};
Object.entries(libraries).forEach(([k,l])=>{let o=document.createElement('option');o.value=k;o.textContent=l.name+`（${l.items.length}款）`;$('#styleSelect').appendChild(o)});$('#styleSelect').onchange=e=>setStyle(e.target.value);renderChrome();render();
window.ElementLab={libraries,svgFor,makeZip};
</script>
