<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Element Lab 可编辑组件库</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#e7e5e0;color:#19181d;font-family:Arial,"Microsoft YaHei",sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}header{height:64px;background:#17171d;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 24px}header i{color:var(--accent);font-style:normal}.app{display:grid;grid-template-columns:220px 1fr 280px;height:calc(100vh - 64px)}aside{background:#f8f6f2;padding:22px;overflow:auto}.left{border-right:1px solid #d1cdc6}.right{border-left:1px solid #d1cdc6}.left small,.library>small{font-size:8px;letter-spacing:.16em;color:#918c85}.left h1{font:27px/1.05 Georgia,"Songti SC",serif}.left h1 i{color:var(--accent)}.left p{font-size:10px;color:#777;line-height:1.6}.colors{display:flex;gap:5px;margin:20px 0}.colors button{width:31px;height:31px;border:3px solid white;border-radius:50%;box-shadow:0 0 0 1px #ccc}.filters button{display:block;width:100%;border:0;background:transparent;text-align:left;padding:10px;border-radius:8px;font-size:11px}.filters button.on{background:#19181d;color:white}.library{padding:25px;overflow:auto;background-image:linear-gradient(#d7d3cd 1px,transparent 1px),linear-gradient(90deg,#d7d3cd 1px,transparent 1px);background-size:28px 28px}.library h2{font:26px Georgia,"Songti SC";margin:6px 0 20px}.grid{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px}.card{border:1px solid #d2cec7;background:#faf8f4;border-radius:13px;overflow:hidden}.card.on{border-color:var(--accent);box-shadow:0 8px 20px #4442}.stage,.preview{height:155px;display:grid;place-items:center;padding:15px;background-color:#dedbd5;background-image:linear-gradient(45deg,#d0ccc5 25%,transparent 25%),linear-gradient(-45deg,#d0ccc5 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#d0ccc5 75%),linear-gradient(-45deg,transparent 75%,#d0ccc5 75%);background-size:14px 14px;background-position:0 0,0 7px,7px -7px,-7px 0}.card footer{padding:10px}.card footer b{display:block;font-size:11px}.card footer small{font-size:8px}.visual{max-width:200px;text-align:center}.modal{background:white;padding:15px 20px;border-radius:18px;box-shadow:0 12px 25px #3333}.modal i{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:50%;background:var(--accent);font-style:normal}.modal b{font:18px Georgia}.modal p{font-size:9px;color:#777}.toast{display:flex;align-items:center;gap:9px;background:#19181d;color:white;padding:12px;border-radius:13px}.toast i{background:var(--accent);color:#111;border-radius:50%;padding:5px}.sticker{font:900 35px Impact;color:white;-webkit-text-stroke:2px #19181d;text-shadow:4px 4px var(--accent);transform:rotate(-6deg)}.note{background:#cfff42;padding:14px;border:1px dashed #111;box-shadow:5px 5px #111;transform:rotate(-3deg);font:bold 15px Georgia}.headline{font:900 29px Impact;color:var(--accent);-webkit-text-stroke:1px white;text-shadow:3px 3px #19181d}.pill{background:#19181ddd;color:white;border:1px solid #fff8;padding:12px 18px;border-radius:99px;box-shadow:0 0 0 5px #ffffff44}.pill i{background:var(--accent);color:#111;border-radius:50%;padding:7px;margin-left:12px}.ring{width:100px;height:100px;border-radius:50%;display:grid;place-items:center;background:#19181dcc;color:white;border:1px solid white;box-shadow:0 0 0 7px #ffffff44}.profile{display:flex;align-items:center;gap:8px;background:white;padding:10px;border-radius:14px}.profile i{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#81422e)}.profile span{font-size:9px;text-align:left}.profile button{border:0;background:var(--accent);border-radius:7px;padding:6px}.caption{background:#19181dee;color:white;border-left:4px solid var(--accent);padding:13px;text-align:left}.stats{display:flex;gap:15px;background:#fff;padding:12px 16px;border-radius:14px}.stats span{font-size:8px}.stats b{display:block;font-size:15px}.story{width:94px;height:94px;border-radius:50%;padding:5px;background:conic-gradient(var(--accent),#fff,var(--accent));display:grid;place-items:center}.story div{width:100%;height:100%;border-radius:50%;border:4px solid white;background:#19181d;color:white;display:grid;place-items:center;font:bold 11px Georgia}.tabs{display:flex;background:white;border-radius:12px;padding:7px}.tabs span{padding:8px 12px;font-size:8px}.tabs span:first-child{background:#19181d;color:white;border-radius:8px}.poll{background:#fff0f5;border:2px solid white;border-radius:17px;padding:14px;box-shadow:4px 4px var(--accent)}.poll b{font-family:Georgia}.poll div{display:flex;gap:5px;margin-top:9px}.poll button{border:0;background:white;padding:7px 16px}.quote{background:white;padding:14px 18px;border:2px solid #19181d;border-radius:50%;font:italic bold 14px Georgia}.checklist{background:white;border-radius:13px;padding:13px;text-align:left}.checklist p{margin:7px 0 0;font-size:8px;line-height:1.8}.checklist i{color:var(--accent);font-style:normal}.search{background:white;border:1px solid #bbb;border-radius:99px;padding:11px 16px;min-width:180px;text-align:left;font-size:9px}.search b{float:right}.dots{display:flex;gap:7px;background:#ffffffbb;padding:10px 14px;border-radius:99px}.dots i{width:8px;height:8px;border-radius:50%;background:#bbb}.dots i:first-child{width:24px;border-radius:8px;background:var(--accent)}.outlineType{font:900 28px Georgia;color:white;-webkit-text-stroke:1px #19181d;text-shadow:3px 3px var(--accent)}.highlight{font:900 18px Georgia;background:linear-gradient(transparent 50%,var(--accent) 50%);padding:5px;transform:rotate(-3deg)}.preview{height:190px;border-radius:12px;margin:12px 0 18px}.field{margin:12px 0}.field label{display:block;font-size:9px;color:#777;margin-bottom:5px}.field input,.field textarea{width:100%;border:1px solid #d6d1ca;border-radius:8px;padding:9px}.field textarea{height:58px}.export{width:100%;border:0;background:#19181d;color:white;padding:12px;border-radius:9px}.export b{float:right;color:var(--accent)}.tip{font-size:9px;color:#888;line-height:1.5}@media(max-width:850px){.app{grid-template-columns:180px 1fr}.right{display:none}.grid{grid-template-columns:repeat(2,1fr)}}
</style></head><body style="--accent:#ef93b4"><header><b>ELEMENT<i>LAB</i></b><span>视频视觉组件库 · 20 ITEMS</span></header><div class="app"><aside class="left"><small>VIDEO UI ASSET LIBRARY</small><h1>可编辑的<br><i>视觉元素库。</i></h1><p>根据五张参考图扩充，用于视频剪辑、空间高斯与交互原型。</p><div class="colors"><button style="background:#ef93b4" data-c="#ef93b4"></button><button style="background:#ff8b9e" data-c="#ff8b9e"></button><button style="background:#cfff42" data-c="#cfff42"></button><button style="background:#8a4f37" data-c="#8a4f37"></button></div><div class="filters"></div></aside><section class="library"><small>ASSET COLLECTION / EXPANDED</small><h2 id="heading">全部视觉组件</h2><div class="grid" id="grid"></div></section><aside class="right"><small>元素属性</small><h3 id="assetName"></h3><div class="preview" id="preview"></div><div class="field"><label>主文字（可编辑）</label><input id="mainText"></div><div class="field"><label>辅助文字（可编辑）</label><textarea id="subText"></textarea></div><button class="export" id="exportBtn">导出可编辑 SVG <b>↗</b></button><p class="tip">SVG 保留文字节点，可在 Figma、Illustrator 等软件继续编辑。</p></aside></div>
<script>
const items=[['弹窗','欢迎弹窗','modal','欢迎来我家','准备好一起探索了吗？'],['弹窗','成功提示','toast','收藏成功','已加入「家的灵感」'],['贴画','WOW 手写贴','sticker','WOW!',''],['贴画','便利贴','note','这里也太舒服了吧！','ROOM NOTE 01'],['特效文字','空间大标题','headline','ROOM TOUR','新家漫游'],['特效文字','重点字幕','headline','都聊了点啥？','百万探家博主来我家'],['空间按钮','进入空间','pill','进入空间','点击探索'],['空间按钮','方向锚点','ring','向前探索','2.4m'],['信息卡','人物名片','profile','李小里','生活方式创作者'],['信息卡','视频信息条','caption','新家 Room tour','《超想逛你家》拍摄的一天'],['信息卡','主页数据条','stats','2060 粉丝','110 帖子 · 60 关注'],['信息卡','故事圆环','story','NEW','点击查看故事'],['空间按钮','标签导航','tabs','作品','收藏 · 关于'],['弹窗','双选投票卡','poll','你想先看哪里？','客厅 · 卧室'],['贴画','语录气泡','quote','做自己喜欢的事','DAILY QUOTE'],['信息卡','社媒清单','checklist','今日探索清单','客厅 · 厨房 · 阳台'],['空间按钮','胶囊搜索框','search','搜索空间灵感','SEARCH'],['空间按钮','轮播指示器','dots','1 / 4','左右滑动'],['特效文字','复古描边标题','outlineType','理想生活样本','EDITORIAL'],['贴画','荧光重点贴','highlight','值得收藏！','HIGHLIGHT']];
let selected=0,filter='全部',accent='#ef93b4',copy={};const $=s=>document.querySelector(s),esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));const data=i=>copy[i]||{main:items[i][3],sub:items[i][4]};
function visual(i){let d=data(i),m=esc(d.main),s=esc(d.sub),k=items[i][2];if(k==='modal')return `<div class="visual modal"><i>✦</i><br><b>${m}</b><p>${s}</p></div>`;if(k==='toast')return `<div class="visual toast"><i>✓</i><span><b>${m}</b><br><small>${s}</small></span></div>`;if(k==='sticker')return `<div class="visual sticker">${m}</div>`;if(k==='note')return `<div class="visual note"><small>${s}</small><br>${m}</div>`;if(k==='headline')return `<div class="visual headline"><small>${s}</small><br>${m}</div>`;if(k==='pill')return `<div class="visual pill">${m}<i>→</i></div>`;if(k==='ring')return `<div class="visual ring">⌃<small>${m}<br>${s}</small></div>`;if(k==='profile')return `<div class="visual profile"><i></i><span><b>${m}</b><br>${s}</span><button>＋ 关注</button></div>`;if(k==='caption')return `<div class="visual caption"><b>${m}</b><br><small>${s}</small></div>`;if(k==='stats')return `<div class="visual stats"><span><b>2060</b>粉丝</span><span><b>110</b>帖子</span><span><b>60</b>关注</span></div>`;if(k==='story')return `<div class="visual story"><div>${m}</div></div>`;if(k==='tabs')return `<div class="visual tabs"><span>${m}</span><span>收藏</span><span>关于</span></div>`;if(k==='poll')return `<div class="visual poll"><b>${m}</b><div><button>客厅</button><button>卧室</button></div></div>`;if(k==='quote')return `<div class="visual quote">“${m}”<br><small>${s}</small></div>`;if(k==='checklist')return `<div class="visual checklist"><b>${m}</b><p><i>✓</i> 客厅灵感<br><i>✓</i> 厨房细节<br>○ 阳台漫游</p></div>`;if(k==='search')return `<div class="visual search">⌕　${m}<b>→</b></div>`;if(k==='dots')return `<div class="visual dots"><i></i><i></i><i></i><i></i></div>`;if(k==='outlineType')return `<div class="visual outlineType">${m}<br><small>${s}</small></div>`;return `<div class="visual highlight">${m}</div>`}
const cats=['全部',...new Set(items.map(x=>x[0]))];cats.forEach(c=>{let b=document.createElement('button');b.textContent=c;b.className=c==='全部'?'on':'';b.onclick=()=>{filter=c;document.querySelectorAll('.filters button').forEach(x=>x.classList.toggle('on',x===b));$('#heading').textContent=c+'视觉组件';render()};$('.filters').appendChild(b)});document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{accent=b.dataset.c;document.body.style.setProperty('--accent',accent)});
function sync(){let d=data(selected);$('#assetName').textContent=items[selected][1];$('#preview').innerHTML=visual(selected);$('#mainText').value=d.main;$('#subText').value=d.sub}function render(){let g=$('#grid');g.innerHTML='';items.forEach((x,i)=>{if(filter!=='全部'&&x[0]!==filter)return;let a=document.createElement('article');a.className='card '+(i===selected?'on':'');a.innerHTML=`<div class="stage">${visual(i)}</div><footer><b>${x[1]}</b><small>${x[0]} · 文字可编辑</small></footer>`;a.onclick=()=>{selected=i;render()};g.appendChild(a)});sync()}$('#mainText').oninput=e=>{copy[selected]={main:e.target.value,sub:$('#subText').value};render()};$('#subText').oninput=e=>{copy[selected]={main:$('#mainText').value,sub:e.target.value};render()};$('#exportBtn').onclick=()=>{let d=data(selected),svg=`<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700"><text x="600" y="330" text-anchor="middle" font-family="Arial,Microsoft YaHei" font-size="86" font-weight="800" fill="${accent}" stroke="#17171d" stroke-width="2">${esc(d.main)}</text><text x="600" y="410" text-anchor="middle" font-family="Arial,Microsoft YaHei" font-size="32">${esc(d.sub)}</text></svg>`,a=document.createElement('a');a.href=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));a.download=items[selected][1]+'.svg';a.click()};render();
</script></body></html>
