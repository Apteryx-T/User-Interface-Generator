<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ElementLab · 可编辑视频视觉元素库</title>
<style>
:root{--accent:#ef93b4;--ink:#19181d;--paper:#faf8f4;--muted:#77736d}
*{box-sizing:border-box}body{margin:0;background:#e7e5e0;color:var(--ink);font-family:Arial,"Microsoft YaHei",sans-serif}button,input,textarea,select{font:inherit}button,select{cursor:pointer}
header{height:68px;background:#17171d;color:#fff;display:flex;align-items:center;gap:18px;padding:0 22px}header .brand{font-weight:900;letter-spacing:.04em}header .brand i{color:var(--accent);font-style:normal}.style-select{appearance:none;min-width:215px;border:1px solid #ffffff38;border-radius:10px;background:#28282f;color:#fff;padding:10px 38px 10px 13px;background-image:linear-gradient(45deg,transparent 50%,#fff 50%),linear-gradient(135deg,#fff 50%,transparent 50%);background-position:calc(100% - 17px) 16px,calc(100% - 12px) 16px;background-size:5px 5px;background-repeat:no-repeat}.header-meta{font-size:11px;color:#aaa}.batch{margin-left:auto;border:1px solid #ffffff42;background:var(--accent);color:#15151a;padding:10px 15px;border-radius:10px;font-size:11px;font-weight:800}
.app{display:grid;grid-template-columns:220px minmax(440px,1fr) 286px;height:calc(100vh - 68px)}aside{background:#f8f6f2;padding:22px;overflow:auto}.left{border-right:1px solid #d1cdc6}.right{border-left:1px solid #d1cdc6}.eyebrow{font-size:8px;letter-spacing:.16em;color:#918c85}.left h1{font:27px/1.07 Georgia,"Songti SC",serif;margin:13px 0}.left h1 i{color:var(--accent)}.left p{font-size:10px;color:#777;line-height:1.65}.colors{display:flex;gap:7px;margin:20px 0}.colors button{width:31px;height:31px;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 1px #ccc}.filters button{display:block;width:100%;border:0;background:transparent;text-align:left;padding:10px;border-radius:8px;font-size:11px}.filters button.on{background:var(--ink);color:#fff}.style-note{margin-top:20px;padding:12px;border:1px dashed #bbb;border-radius:10px;font-size:9px;color:#777;line-height:1.6}

.right h3{margin:10px 0}.preview{height:190px;border-radius:12px;margin:12px 0 18px}.field{margin:12px 0}.field label{display:block;font-size:9px;color:#777;margin-bottom:5px}.field input,.field textarea{width:100%;border:1px solid #d6d1ca;border-radius:8px;padding:9px}.field textarea{height:58px;resize:vertical}.export{width:100%;border:0;background:var(--ink);color:#fff;padding:12px;border-radius:9px}.export b{float:right;color:var(--accent)}.tip{font-size:9px;color:#888;line-height:1.55}.count-badge{display:inline-block;background:var(--accent);color:#111;border-radius:99px;padding:4px 8px;font:bold 9px Arial;margin-left:8px}

</head>
<body>
<header>
  <b class="brand">ELEMENT<i>LAB</i></b>
  <select id="styleSelect" class="style-select" aria-label="选择视觉元素库"></select>
  <span class="header-meta" id="headerMeta"></span>
  <button class="batch" id="batchBtn">一键打包全部视觉组件 ↓</button>
</header>
<div class="app">
  <aside class="left">
    <small class="eyebrow">VIDEO UI ASSET LIBRARY</small>
    <h1>可编辑的<br><i>视觉元素库。</i></h1>
    <p id="styleDescription"></p>
    <div class="colors" id="colors"></div>
    <div class="filters" id="filters"></div>
    <div class="style-note">小红书手机端比例校准<br>透明背景 · 原生 SVG<br>文字节点可在 Figma / Illustrator 中继续编辑。</div>
  </aside>
  <section class="library">
    <small class="eyebrow" id="collectionLabel"></small>
    <h2 id="heading"></h2>
    <div class="grid" id="grid"></div>
  </section>
  <aside class="right">
    <small class="eyebrow">元素属性</small>
    <h3 id="assetName"></h3>
    <div class="preview" id="preview"></div>
    <div class="field"><label>主文字（可编辑）</label><input id="mainText"></div>
    <div class="field"><label>辅助文字（可编辑）</label><textarea id="subText"></textarea></div>
    <button class="export" id="exportBtn">导出可编辑 SVG <b>↗</b></button>
    <p class="tip">导出内容与预览一致；不使用 foreignObject，适合视频剪辑、AE/PR、Figma、Illustrator 和空间交互。</p>
  </aside>
</div>

    else if(k==='ticket')body=`<path d="M300 250H900V300Q850 315 900 350Q850 385 900 400V450H300V400Q350 385 300 350Q350 315 300 300Z" fill="white" stroke="white" stroke-width="30"/><path d="M300 250H900V300Q850 315 900 350Q850 385 900 400V450H300V400Q350 385 300 350Q350 315 300 300Z" fill="${lime}" stroke="${ink}" stroke-width="8"/>${text(455,340,m,42,ink,900)}<rect x="625" y="315" width="190" height="72" rx="36" fill="white" stroke="${ink}" stroke-width="6"/><circle cx="775" cy="351" r="28" fill="${a}"/>${text(700,360,s,24,ink,800)}`;
    else if(k==='username')body=`<g transform="rotate(-5 600 350)"><rect x="330" y="270" width="540" height="160" rx="80" fill="white" stroke="white" stroke-width="28"/><rect x="330" y="270" width="540" height="160" rx="80" fill="${a}" stroke="${ink}" stroke-width="8"/><rect x="400" y="315" width="400" height="72" rx="18" fill="${ink}"/>${text(600,363,m,38,white,800)}${text(600,470,s,22,ink,800)}</g>`;

function setStyle(next){styleKey=next;selected=0;filter='全部';document.body.style.setProperty('--accent',lib().accent);renderChrome();render()}
function renderChrome(){let l=lib();$('#headerMeta').textContent=`${l.name} · ${l.items.length} ITEMS / 全库 40 ITEMS`;$('#styleDescription').textContent=l.description;$('#collectionLabel').textContent=l.label;$('#colors').innerHTML='';l.palette.forEach(c=>{let b=document.createElement('button');b.style.background=c;b.title='切换主题色 '+c;b.onclick=()=>{l.accent=c;document.body.style.setProperty('--accent',c);render()};$('#colors').appendChild(b)});let cats=['全部',...new Set(l.items.map(x=>x[0]))];$('#filters').innerHTML='';cats.forEach(c=>{let b=document.createElement('button');b.textContent=c+(c==='全部'?` (${l.items.length})`:` (${l.items.filter(x=>x[0]===c).length})`);b.className=c===filter?'on':'';b.onclick=()=>{filter=c;renderChrome();render()};$('#filters').appendChild(b)});$('#heading').innerHTML=`${filter==='全部'?l.name:filter+'视觉组件'} <span class="count-badge">${filter==='全部'?l.items.length:l.items.filter(x=>x[0]===filter).length}</span>`}
function sync(){let d=data(selected);$('#assetName').textContent=items()[selected][1];$('#preview').innerHTML=svgFor(selected);$('#mainText').value=d.main;$('#subText').value=d.sub}
function render(){let g=$('#grid');g.innerHTML='';items().forEach((x,i)=>{if(filter!=='全部'&&x[0]!==filter)return;let a=document.createElement('article');a.className='card '+(i===selected?'on':'');a.innerHTML=`<div class="stage">${svgFor(i)}</div><footer><span><b>${esc(x[1])}</b><small>${esc(x[0])} · 文字可编辑</small></span><button class="card-export">导出 ↓</button></footer>`;a.onclick=()=>{selected=i;render()};a.querySelector('.card-export').onclick=e=>{e.stopPropagation();downloadOne(i)};g.appendChild(a)});sync()}
$('#mainText').oninput=e=>{copies[key(selected)]={main:e.target.value,sub:$('#subText').value};render()};$('#subText').oninput=e=>{copies[key(selected)]={main:$('#mainText').value,sub:e.target.value};render()};
function safeName(s){return s.replace(/[\\/:*?"<>|]/g,'-')}function saveBlob(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1200)}function downloadOne(i){saveBlob(new Blob([svgFor(i)],{type:'image/svg+xml;charset=utf-8'}),safeName(lib().name+'-'+items()[i][1])+'.svg')}$('#exportBtn').onclick=()=>downloadOne(selected);
function u16(n){return[n&255,n>>>8&255]}function u32(n){return[n&255,n>>>8&255,n>>>16&255,n>>>24&255]}function crc32(bytes){let c=-1;for(let b of bytes){c^=b;for(let j=0;j<8;j++)c=(c>>>1)^((c&1)?0xedb88320:0)}return(c^-1)>>>0}function makeZip(files){const enc=new TextEncoder(),locals=[],centrals=[];let offset=0;files.forEach(f=>{let name=enc.encode(f.name),content=enc.encode(f.text),crc=crc32(content),local=new Uint8Array([...u32(0x04034b50),...u16(20),...u16(0x800),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(content.length),...u32(content.length),...u16(name.length),...u16(0),...name,...content]);locals.push(local);let central=new Uint8Array([...u32(0x02014b50),...u16(20),...u16(20),...u16(0x800),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(content.length),...u32(content.length),...u16(name.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset),...name]);centrals.push(central);offset+=local.length});let centralSize=centrals.reduce((n,x)=>n+x.length,0),end=new Uint8Array([...u32(0x06054b50),...u16(0),...u16(0),...u16(files.length),...u16(files.length),...u32(centralSize),...u32(offset),...u16(0)]);return new Blob([...locals,...centrals,end],{type:'application/zip'})}
$('#batchBtn').onclick=()=>{let files=[];Object.entries(libraries).forEach(([sk,l])=>l.items.forEach((x,i)=>files.push({name:`${l.name}/${String(i+1).padStart(2,'0')}-${safeName(x[1])}.svg`,text:svgFor(i,sk)})));saveBlob(makeZip(files),'ElementLab-全部视觉组件-40款.zip')};
Object.entries(libraries).forEach(([k,l])=>{let o=document.createElement('option');o.value=k;o.textContent=l.name+`（${l.items.length}款）`;$('#styleSelect').appendChild(o)});$('#styleSelect').onchange=e=>setStyle(e.target.value);renderChrome();render();
window.ElementLab={libraries,svgFor,makeZip};
